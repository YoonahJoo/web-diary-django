<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>계정 설정</title>
    <link href="singlePageTemplate.css" rel="stylesheet" type="text/css">
    <script>
        var __adobewebfontsappname__="dreamweaver"
    </script>
    {% load static %}
    <style>
        @charset "UTF-8";
        @import url('https://fonts.googleapis.com/css2?family=Orbit&display=swap');

        body {
            font-family: source-sans-pro;
            background-color: #f2f2f2;
            margin-top: 0px;
            margin-right: 0px;
            margin-bottom: 0px;
            margin-left: 0px;
            font-style: normal;
            font-weight: 200;
        }
        /* Container, main body */
        .container {
            width: 100%;
            margin-left: auto;
            margin-right: auto;
            height: 1000px;
            background-color: #FFFFFF;
        }
        /* Navigation */
        header {
            width: 100%;
            height: 5%;
            background-color: #d4b0b0;
            border-bottom: 5px solid #6e5252;
        }
        #header-folder-list {
            padding-top: 20px;
            padding-bottom: 10px;
            margin-bottom: 1px;
            text-align: center;
            font-family: "Orbit", sans-serif;
        }
        .logo {
            color: #6e5252;
            font-weight: bold;
            text-align: undefined;
            width: 35%;
            float: left;
            margin-top: 15px;
            margin-left: 25px;
            letter-spacing: 3px;
        }
        .hero_header {
            color: #574D4D;
            text-align: start;
            margin-top: 0px;
            margin-right: 50px;
            margin-bottom: 0px;
            margin-left: 50px;
            letter-spacing: 3px;
        }
        /* Hero Section, that box that says HERO */
        .hero {
            background-color: #e6d8d8;
            padding-top: 50px;
            padding-bottom: 150px;
            height: 100%;
        }
        .tagline {
            text-align: start;
            color: #FFFFFF;
            margin-top: 4px;
            margin-left: 50px;
            font-weight: lighter;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #frame {
            background-color:#d4b0b0;
            border-radius: 2%;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #new-folder-frame {
            width: 40%;
            min-width: 350px;
            height: 300px;
            background:#e6d8d8;
            padding: 30px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        #create-btn {
            background-color: #c99a9a;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #create-btn:hover {
            background-color: #b96868;
        }
        #return-btn {
            margin-top: 20px;
        }
        .btn-primary {
            margin-top: 50px;
            text-align: center;
            background-color:#d1a6a6;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 1rem;
            transition: background-color 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #c47474;
        }
    </style>
</head>
<body>
    <!-- Main Container -->
    <div class="container"> 
        <!-- Navigation -->
        <header>
            <a>
                <h4 class="logo">WEB DIARY</h4>
            </a>
        </header>
            
        <section class="hero" id="hero">
            <h2 class="hero_header">
                <div class="container" id="frame">
                    <h1 id="header-folder-list">계정 설정</h1>
                    <div class="container" id="new-folder-frame">
                        <form method="POST">
                            {% csrf_token %}
                            <!-- 사용자 이름 필드 -->
                            <label for="id_username">사용자 이름</label>
                            {{ form.username }}
                            <!-- 저장 버튼 -->
                            <button id="create-btn" type="submit">저장</button>
                        </form>
                        <div class="actions" id="return-btn">
                            <a href="{% url 'folder_list' %}" class="btn-primary">
                                폴더 목록으로 돌아가기
                            </a>
                        </div>
                    </div>
                </div>
            </h2>
        </section>
        
    </div>
    <!-- Main Container Ends -->
</body>
</html>
