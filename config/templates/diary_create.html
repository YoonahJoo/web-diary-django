<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>일기 생성</title>
    <link href="singlePageTemplate.css" rel="stylesheet" type="text/css">
    <script>
        var __adobewebfontsappname__="dreamweaver"
    </script>
    {% load static %}
    <style>
        @charset "UTF-8";
        @import url('https://fonts.googleapis.com/css2?family=Orbit&display=swap');

        body {
            font-family: source-sans-pro;
            background-color: #f2f2f2;
            margin-top: 0px;
            margin-right: 0px;
            margin-bottom: 0px;
            margin-left: 0px;
            font-style: normal;
            font-weight: 200;
        }
        /* Container, main body */
        .container {
            width: 100%;
            margin-left: auto;
            margin-right: auto;
            height: 1000px;
            background-color: #FFFFFF;
        }
        /* Navigation */
        header {
            width: 100%;
            height: 5%;
            background-color: #d4b0b0;
            border-bottom: 5px solid #6e5252;
        }
        .logo {
            color: #6e5252;
            font-weight: bold;
            text-align: undefined;
            width: 35%;
            float: left;
            margin-top: 15px;
            margin-left: 25px;
            letter-spacing: 3px;
        }
        nav {
            float: right;
            width: 50%;
            text-align: right;
            margin-right: 25px;
        }
        header nav ul {
            list-style: none;
            float: right;
        }
        nav ul li {
            float: left;
            color: #FFFFFF;
            font-size: 14px;
            text-align: left;
            margin-right: 1px;
            letter-spacing: 2px;
            font-weight: bold;
            transition: all 0.3s linear;
        }
        /* Navigation buttons at the right */
        ul li a {
            color: #6e5252;
            text-decoration: none;
            font-family: "Orbit", sans-serif;
            font-weight: bolder;
            font-style: normal;
        }
        ul li:hover a {
            color: #8A6E6E;
        }
        .hero_header {
            color: #574D4D;
            text-align: start;
            margin-top: 0px;
            margin-right: 50px;
            margin-bottom: 0px;
            margin-left: 50px;
            letter-spacing: 3px;
        }
        /* Hero Section, that box that says HERO */
        .hero {
            background-color: #e6d8d8;
            padding-top: 50px;
            padding-bottom: 150px;
            height: 100%;
        }
        .tagline {
            text-align: start;
            color: #FFFFFF;
            margin-top: 4px;
            margin-left: 50px;
            font-weight: lighter;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .dropbtn {
            background-color:#d4b0b0;
            color:#574D4D;
            border: none;
            cursor: pointer;
            padding: 0px 0px 1px 6px;
            font-size: 15px;
            font-weight: bold;
            margin-right: 18px;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color:#FFFFFF;
            min-width: 120px;
            z-index: 1;
            font-family: "Orbit", sans-serif;
            font-weight: bold;
            border-radius: 5%;
        }
        .dropdown-content a {
            color:#574D4D;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        #folder-name {
            padding-top: 20px;
            padding-bottom: 10px;
            margin-bottom: 1px;
            text-align: center;
            font-family: "Orbit", sans-serif;
        }
        #frame {
            background-color:#d4b0b0;
            border-radius: 2%;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #new-diary-frame {
            width: 50%;
            height: 445px;
            background:#e6d8d8;
            padding: 30px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        #create-btn {
            background-color: #c99a9a;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #create-btn:hover {
            background-color: #b96868;
        }
        #return-btn {
            margin-top: 20px;
        }
        .btn-primary {
            margin-top: 50px;
            text-align: center;
            background-color:#bd8989;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 1rem;
            transition: background-color 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #c47474;
        }

        input.form-control, textarea.form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            background-color: #f9f9f9;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        input.form-control:focus, textarea.form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
            outline: none;
        }
        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
    </style>
</head>
<body>
    <!-- Main Container -->
    <div class="container"> 
        <!-- Navigation -->
        <header>
            <a>
                <h4 class="logo">WEB DIARY</h4>
            </a>
            <nav>
                <ul>
                    <div class="dropdown" style="float:right;">
                        <button class="dropbtn">
                            |||
                        </button>
                        <div class="dropdown-content">
                            <a onclick="location.href='{% url 'logout' %}'">로그아웃</a>
                        </div>
                    </div>
                </ul>
            </nav>
        </header>    

        <!-- Hero Section -->
        <section class="hero" id="hero">
            <h2 class="hero_header">
                <div class="container" id="frame">
                    <h1 id="folder-name" >{{ folder.name }}에서 일기 쓰기</h1>
                    <div class="container" id="new-diary-frame">
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            <label for="id_title">제목</label>
                            {{ form.title }}
                
                            <label for="id_content">내용</label>
                            {{ form.content }}
                
                            <label for="id_image">이미지</label>
                            {{ form.image }}
                
                            <button id="create-btn" type="submit">저장</button>
                        </form>
                        <div class="actions">
                            <a href="{% url 'folder_detail' folder_name=folder.name %}" class="btn-primary">
                                폴더로 돌아가기
                            </a>
                        </div>
                    </div>
                </div>
            </h2>
        </section>
        
    </div>
    <!-- Main Container Ends -->
</body>
</html>
