<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ diary.title }}</title>
    {% load static %}
    <style>
        body {
            font-family: source-sans-pro;
            background-color: #E2D8D8; /* 배경색 */
            margin: 0;
            padding: 0;
            color: #574D4D; /* 텍스트 색상 */
        }

        /* 상단 로고와 네비게이션 */
        header {
            width: 100%;
            height: 50px; /* diary_create와 동일한 높이 */
            background-color: #d4b0b0;
            border-bottom: 5px solid #6e5252; /* 갈색 줄 */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px; /* 여백 제거 */
            box-sizing: border-box;
        }
        .logo {
            color: #6e5252;
            font-weight: bold;
            font-size: 1.2rem; /* diary_create와 동일한 글씨 크기 */
            letter-spacing: 3px;
            margin: 0;
        }
        nav {
            float: right;
            width: 50%;
            text-align: right;
            margin-right: 25px;
        }
        nav ul {
            list-style: none;
            float: right;
        }
        nav ul li {
            float: left;
            color: #FFFFFF;
            font-size: 14px;
            text-align: left;
            margin-right: 1px;
            letter-spacing: 2px;
            font-weight: bold;
            transition: all 0.3s linear;
        }
        ul li a {
            color: #6e5252;
            text-decoration: none;
            font-weight: bold;
        }
        ul li:hover a {
            color: #8A6E6E;
        }
        .dropbtn {
            background-color: #d4b0b0;
            color: #574D4D;
            border: none;
            cursor: pointer;
            padding: 0px 0px 1px 6px;
            font-size: 1rem;
            font-weight: bold;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #FFFFFF;
            min-width: 120px;
            z-index: 1;
            border-radius: 5px;
        }
        .dropdown-content a {
            color: #574D4D;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 600px;
            background-color: #d4b0b0;            ;
            padding: 30px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin: 50px auto;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            color: #574D4D;
            margin-bottom: 25px;
        }
        p {
            font-size: 1rem;
            margin-bottom: 15px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        button {
            background-color: #c99a9a;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin: 5px 10px;
        }
        button:hover {
            background-color: #b96868;
        }
        .actions {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .btn-primary {
            text-align: center;
            background-color: #c99a9a;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 1rem;
            transition: background-color 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #c47474;
        }
    </style>
</head>
<body>
    <!-- 상단 헤더 -->
    <header>
        <a>
            <h4 class="logo">WEB DIARY</h4>
        </a>
        <nav>
            <ul>
                <div class="dropdown" style="float:right;">
                    <button class="dropbtn">|||</button>
                    <div class="dropdown-content">
                        <a onclick="location.href='{% url 'logout' %}'">로그아웃</a>
                    </div>
                </div>
            </ul>
        </nav>
    </header>

    <!-- 메인 컨테이너 -->
    <div class="container">
        <h1>{{ folder.name }} / {{ diary.title }}</h1>
        <p><strong>작성 날짜:</strong> {{ diary.created_at }}</p>
        <p>{{ diary.content }}</p>
        {% if diary.image %}
            <img src="{{ diary.image.url }}" alt="Diary Image" />
        {% endif %}
        <div class="actions">
            <a href="{% url 'folder_detail' folder_name=diary.folder.name %}" class="btn-primary">돌아가기</a>
            <a href="{% url 'diary_edit' folder_name=folder.name diary_title=diary.title %}" class="btn-primary">일기 수정</a>
        </div>
        <form action="{% url 'diary_delete' folder_name=diary.folder.name diary_title=diary.title %}" method="POST" onsubmit="return confirm('정말로 이 일기를 삭제하시겠습니까?');">
            {% csrf_token %}
            <button type="submit">일기 삭제</button>
        </form>
    </div>
</body>
</html>
