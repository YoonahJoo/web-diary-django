<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ diary.title }} 수정</title>
    {% load static %}
    <style>
        body {
            font-family: source-sans-pro, sans-serif;
            background-color: #E2D8D8;
            margin: 0;
            padding: 0;
            color: #574D4D;
        }

        /* 상단 로고와 네비게이션 */
        header {
            width: 100%;
            height: 50px;
            background-color: #d4b0b0;
            border-bottom: 5px solid #6e5252;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .logo {
            color: #6e5252;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 3px;
            margin: 0;
        }
        nav {
            margin-right: 25px;
        }
        .dropbtn {
            background-color: #d4b0b0;
            color: #574D4D;
            border: none;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 1rem;
            font-weight: bold;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 25px;
            background-color: #FFFFFF;
            min-width: 120px;
            z-index: 1;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .dropdown-content a {
            color: #574D4D;
            padding: 10px 15px;
            display: block;
            text-decoration: none;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* 메인 컨테이너 */
        .container {
            max-width: 600px;
            background-color: #d4b0b0;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin: 50px auto;
            text-align: left;
        }

        h1 {
            font-size: 1.8rem;
            color: #574D4D;
            margin-bottom: 20px;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #574D4D;
        }

        input.form-control, textarea.form-control {
            font-family: source-sans-pro, sans-serif;
            font-size: 1rem;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input.form-control:focus, textarea.form-control:focus {
            border-color: #d4b0b0;
            box-shadow: 0 0 5px rgba(212, 176, 176, 0.5);
            outline: none;
        }

        button {
            background-color: #c99a9a;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        button:hover {
            background-color: #b96868;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-primary {
            background-color: #c99a9a;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 1rem;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #c47474;
        }
    </style>
</head>
<body>
    <!-- 상단 헤더 -->
    <header>
        <h4 class="logo">WEB DIARY</h4>
        <nav>
            <div class="dropdown">
                <button class="dropbtn">|||</button>
                <div class="dropdown-content">
                    <a onclick="location.href='{% url 'logout' %}'">로그아웃</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- 메인 컨테이너 -->
    <div class="container">
        <h1>{{ diary.title }} 수정</h1>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <label for="id_title">제목</label>
            {{ form.title }}

            <label for="id_content">내용</label>
            {{ form.content }}

            <label for="id_image">이미지</label>
            {{ form.image }}

            <button type="submit">저장</button>
        </form>
        <div class="actions">
            <a href="{% url 'diary_detail' folder_name=folder.name diary_title=diary.title %}" class="btn-primary">일기 상세 페이지로 돌아가기</a>
        </div>
    </div>
</body>
</html>
