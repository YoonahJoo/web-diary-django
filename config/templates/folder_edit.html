<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>폴더 이름 수정</title>
    <link href="singlePageTemplate.css" rel="stylesheet" type="text/css">
    <script>
        var __adobewebfontsappname__="dreamweaver"
    </script>
    {% load static %}
    <style>
        @charset "UTF-8";
        @import url('https://fonts.googleapis.com/css2?family=Orbit&display=swap');

        body {
            font-family: source-sans-pro;
            background-color: #f2f2f2;
            margin: 0;
            font-style: normal;
            font-weight: 200;
        }
        /* Container, main body */
        .container {
            width: 100%;
            margin: auto;
            height: 1000px;
            background-color: #FFFFFF;
        }
        /* Navigation */
        header {
            width: 100%;
            height: 5%;
            background-color: #d4b0b0;
            border-bottom: 5px solid #6e5252;
        }
        #header-folder-list {
            padding-top: 20px;
            padding-bottom: 10px;
            margin-bottom: 1px;
            text-align: center;
            font-family: "Orbit", sans-serif;
        }
        .logo {
            color: #6e5252;
            font-weight: bold;
            width: 35%;
            float: left;
            margin-top: 15px;
            margin-left: 25px;
            letter-spacing: 3px;
        }
        nav {
            float: right;
            width: 50%;
            text-align: right;
            margin-right: 25px;
        }
        header nav ul {
            list-style: none;
            float: right;
        }
        nav ul li {
            float: left;
            color: #FFFFFF;
            font-size: 14px;
            margin-right: 1px;
            letter-spacing: 2px;
            font-weight: bold;
            transition: all 0.3s linear;
        }
        ul li a {
            color: #6e5252;
            text-decoration: none;
            font-family: "Orbit", sans-serif;
            font-weight: bolder;
        }
        ul li:hover a {
            color: #8A6E6E;
        }
        .hero {
            background-color: #e6d8d8;
            padding-top: 50px;
            padding-bottom: 150px;
            height: 100%;
        }
        .dropbtn {
            background-color: #d4b0b0;
            color: #574D4D;
            border: none;
            cursor: pointer;
            padding: 0px 0px 1px 6px;
            font-size: 15px;
            font-weight: bold;
            margin-right: 18px;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #FFFFFF;
            min-width: 120px;
            z-index: 1;
            font-family: "Orbit", sans-serif;
            font-weight: bold;
            border-radius: 5%;
        }
        .dropdown-content a {
            color: #574D4D;
            padding: 12px 16px;
            text-decoration: none;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        #frame {
            background-color: #d4b0b0;
            border-radius: 2%;
            width: 90%; /* 가로 크기 조정 */
            height: 800px; /* 세로 크기 조정 */
            margin: auto; /* 중앙 정렬 */
            padding: 20px; /* 내부 여백 */
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #new-folder-frame {
            width: 50%;
            height: 300px;
            background: #e6d8d8;
            padding: 30px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        #create-btn {
            background-color: #c99a9a;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #create-btn:hover {
            background-color: #b96868;
        }
        #return-btn {
            margin-top: 20px;
        }
        .btn-primary {
            margin-top: 50px;
            text-align: center;
            background-color: #d1a6a6;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 1rem;
            transition: background-color 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #c47474;
        }
        #header-folder-list {
            color: #574D4D; /* 원하는 색상 코드로 변경 */
            font-family: "Orbit", sans-serif;
        }
        label {
            color: #6e5252; /* 원하는 색상으로 변경 */
            font-size: 1.2rem; /* 필요에 따라 글자 크기도 조정 가능 */
            font-family: "Orbit", sans-serif; /* 폰트 조정 */
        }

    </style>
</head>

<body>
    <div class="container"> 
    <header>
        <a>
            <h4 class="logo">WEB DIARY</h4>
        </a>
        <nav>
            <ul>
                <div class="dropdown" style="float:right;">
                    <button class="dropbtn">
                        |||
                    </button>
                    <div class="dropdown-content">
                        <a onclick="location.href='{% url 'account_settings' %}'">계정 설정</a>
                        <a onclick="location.href='{% url 'logout' %}'">로그아웃</a>
                    </div>
                </div>
            </ul>
        </nav>
    </header>
            
    <section class="hero" id="hero">
        <h2 class="hero_header">
            <div class="container" id="frame">
                <h1 id="header-folder-list">폴더 이름 수정</h1>
                <div class="container" id="new-folder-frame">
                    <form method="post">
                        {% csrf_token %}
                        <label for="id_name">폴더 이름</label>
                        <input type="text" id="id_name" name="name" value="{{ form.name.value }}" placeholder="폴더 이름을 입력하세요" required>
                        <button id="create-btn" type="submit">저장</button>
                    </form>
                    <div class="actions" id="return-btn">
                        <a href="{% url 'folder_list' %}" class="btn-primary">
                            폴더 목록으로 돌아가기
                        </a>
                    </div>
                </div>
            </div>
        </h2>
    </section>
    </div>
</body>
</html>
