<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>계정 생성</title>
    <link href="singlePageTemplate.css" rel="stylesheet" type="text/css">
    <script>
        var __adobewebfontsappname__="dreamweaver"
    </script>
    {% load static %}
    <style>
        @charset "UTF-8";
        @import url('https://fonts.googleapis.com/css2?family=Orbit&display=swap');

        /* 전체 페이지 스타일 */
        body {
            font-family: "Orbit", sans-serif;
            background-color: #e6d8d8;
            font-style: normal;
            font-weight: 200;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #574D4D;
            letter-spacing: 3px;
        }

        .container {
            text-align: center;
            background: #d4b0b0;
            padding: 30px 25px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
        }

        header {
            width: 100%;
            height: 50px;
            background-color: #d4b0b0;
            border-bottom: 5px solid #6e5252;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .loogo {
            font-family: source-sans-pro;
            color: #6e5252;
            font-weight: bold;
            text-align: undefined;
            width: 35%;
            float: left;
            margin-top: 15px;
            margin-left: 25px;
            letter-spacing: 3px;
        }

        header ul {
            list-style: none;
            float: right;
        }

        ul li {
            float: left;
            color: #FFFFFF;
            font-size: 14px;
            text-align: left;
            margin-right: 1px;
            letter-spacing: 2px;
            font-weight: bold;
            transition: all 0.3s linear;
        }

        .hero_header {
            color: #574D4D;
            text-align: start;
            margin-top: 0px;
            margin-right: 50px;
            margin-bottom: 0px;
            margin-left: 50px;
            letter-spacing: 3px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            text-align: left;
            flex-direction: column; /* label과 input을 세로로 배치 */
            align-items: stretch; /* 너비를 부모 컨테이너에 맞춤 */
            width: 100%; /* 입력 필드가 전체 너비를 차지 */
            display: flex;
        }

        .form-group label {
            margin-bottom: 15px !important; /* label 아래에만 간격 적용 */
        }

        label {
            text-align: left;
            font-size: 1.0rem;
            color: #6e5252;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%; /* 입력 필드가 전체 너비를 사용 */
            box-sizing: border-box; /* 패딩 포함하여 크기 계산 */
            background-color: #fff;
            color: #574D4D;
            font-family: "Orbit", sans-serif;
            border: 1px solid #8A6E6E;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
            outline: none;
        }

        input[type="submit"] {
            margin: 0 -25px;
            background: #d4b0b0;
            box-sizing: border-box;
            display: block;
            text-align: center;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 1rem;
            transition: background-color 0.2s;
            border-top:1.1px solid white;
            border-bottom:1.1px solid white;
            border-left: #d4b0b0;
            border-right: #d4b0b0;
            font-weight: bold;
            color: white;
            letter-spacing: 3px;
            font-family: "Orbit", sans-serif;
        }

        input[type="submit"]:hover {
            transform: scale(1.02);
        }

        .error-message {
            color: red;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .login-link {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #666;
        }

        .login-link a {
            color: white;
            font-weight: 600;
            font-family: source-sans-pro;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <a>
            <h4 class="loogo">WEB DIARY</h4>
        </a>
    </header>
    <div class="container">
        <h1>계정 생성</h1>
        <form id="signup-form" method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username">사용자 이름</label>
                {{ form.username }}
                <div class="error-message" id="username-error"></div>
            </div>

            <div class="form-group">
                <label for="id_password1">비밀번호</label>
                {{ form.password1 }}
                <div class="error-message" id="password-error"></div>
            </div>

            <div class="form-group">
                <label for="id_password2">비밀번호 확인</label>
                {{ form.password2 }}
                <div class="error-message" id="password2-error"></div>
            </div>

            <input type="submit" value="계정 생성">
        </form>

        <div class="login-link">
            <p>이미 계정이 있으신가요? <a href="{% url 'login' %}">로그인</a></p>
        </div>
    </div>

    <script>
        // 폼 제출 이벤트
        document.getElementById('signup-form').onsubmit = function(event) {
            event.preventDefault();  // 기본 제출 방지

            // 필드 값과 오류 메시지를 초기화
            let formIsValid = true;
            document.getElementById('username-error').textContent = '';
            document.getElementById('password-error').textContent = '';
            document.getElementById('password2-error').textContent = '';

            // 사용자 이름 유효성 검사
            let username = document.getElementById('id_username').value;
            if (username === '') {
                formIsValid = false;
                document.getElementById('username-error').textContent = '사용자 이름은 필수입니다.';
            }

            // 비밀번호 유효성 검사
            let password1 = document.getElementById('id_password1').value;
            if (password1.length < 8) {
                formIsValid = false;
                document.getElementById('password-error').textContent = '비밀번호는 최소 8자 이상이어야 합니다.';
            }

            // 비밀번호 확인 일치 검사
            let password2 = document.getElementById('id_password2').value;
            if (password1 !== password2) {
                formIsValid = false;
                document.getElementById('password2-error').textContent = '비밀번호 확인이 일치하지 않습니다.';
            }

            // 유효성 검사가 완료되면 폼을 제출
            if (formIsValid) {
                event.target.submit();
            }
        };
    </script>
</body>
</html>
